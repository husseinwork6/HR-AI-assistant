<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR AI Assistant</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl bg-slate-800 rounded-xl shadow-2xl border border-slate-700 p-6 md:p-8">

    <div class="flex items-center space-x-3 pb-6 border-b border-slate-700">
      <div class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center text-xl font-bold">
        🤖
      </div>
      <div>
        <h1 class="text-xl font-bold text-white">HR AI Assistant</h1>
        <p class="text-xs text-slate-400">Ask policy questions or check employee records</p>
      </div>
    </div>

    <form id="askForm" class="mt-6 space-y-4">
      <div>
        <label for="employeeId" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">
          Employee ID
        </label>
        <input
          type="text"
          id="employeeId"
          value="EMP001"
          required
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-colors"
          placeholder="e.g. EMP001"
        />
      </div>

      <div>
        <label for="question" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">
          Question
        </label>
        <textarea
          id="question"
          rows="3"
          required
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-colors resize-none"
          placeholder="e.g. How many leave days do I have left?"
        ></textarea>
      </div>

      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center space-x-2"
      >
        <span>Ask Assistant</span>
      </button>
    </form>

    <div id="responseContainer" class="hidden mt-6 pt-6 border-t border-slate-700">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Answer</span>
        <span id="sourceBadge" class="text-xs font-medium px-2.5 py-1 rounded-full"></span>
      </div>

      <div id="answerText" class="p-4 rounded-lg bg-slate-900 text-sm text-slate-200 leading-relaxed border border-slate-700">
      </div>
    </div>

  </div>

  <script>
    // ✅ Updated URL pointing to your permanent Modal production endpoint
    const API_URL = "https://husseinwork6--hr-ai-assistant-fastapi-app.modal.run/ask";

    const form = document.getElementById('askForm');
    const submitBtn = document.getElementById('submitBtn');
    const responseContainer = document.getElementById('responseContainer');
    const answerText = document.getElementById('answerText');
    const sourceBadge = document.getElementById('sourceBadge');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const employee_id = document.getElementById('employeeId').value.trim();
      const question = document.getElementById('question').value.trim();

      // UI Loading state
      submitBtn.disabled = true;
      submitBtn.innerText = "Reasoning...";
      responseContainer.classList.add('hidden');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employee_id, question })
        });

        const data = await response.json();

        // Check if response is ok
        if (!response.ok) {
          throw new Error(data.detail || "Failed to fetch response");
        }

        // Render Answer
        answerText.innerText = data.answer || "No response text received.";

        // Render Source Badge
        if (data.source === 'rag') {
          sourceBadge.innerText = "Source: Policy Documents (RAG)";
          sourceBadge.className = "text-xs font-medium px-2.5 py-1 rounded-full bg-blue-900/60 text-blue-300 border border-blue-700";
        } else if (data.source === 'structured_data') {
          sourceBadge.innerText = "Source: Employee Database (SQL)";
          sourceBadge.className = "text-xs font-medium px-2.5 py-1 rounded-full bg-emerald-900/60 text-emerald-300 border border-emerald-700";
        } else {
          sourceBadge.innerText = "Source: Unknown / Out of Scope";
          sourceBadge.className = "text-xs font-medium px-2.5 py-1 rounded-full bg-slate-700 text-slate-300 border border-slate-600";
        }

        responseContainer.classList.remove('hidden');
      } catch (err) {
        answerText.innerText = "Error connecting to the backend server. Make sure your Modal deployment is active.";
        sourceBadge.innerText = "Connection Error";
        sourceBadge.className = "text-xs font-medium px-2.5 py-1 rounded-full bg-rose-900/60 text-rose-300 border border-rose-700";
        responseContainer.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Ask Assistant";
      }
    });
  </script>
</body>
</html>
